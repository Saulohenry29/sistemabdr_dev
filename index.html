<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDR Sistema</title>

<link rel="stylesheet" href="./css/estilo.css">

<style>
.menu {
width: 100%;
max-width: 400px;
background: #fff;
padding: 20px;
border-radius: 15px;
text-align: center;
box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.menu button {
width: 100%;
padding: 12px;
margin: 10px 0;
border: none;
border-radius: 8px;
background: #a4161a;
color: white;
font-size: 16px;
cursor: pointer;
}

.menu button:hover {
background: #7a0f12;
}
</style>

</head>

<body>

<div class="menu">

<div class="logo">
<img src="./imagens/logo.png">
</div>

<h2>BDR CONSTRUART</h2>
<p>Controle de Patrimônio</p>

<hr><br>

<button onclick="irConsulta()">Consultar Item</button>

<button onclick="irEtiqueta()">Gerar Etiqueta</button>

</div>

<script>

function irConsulta() {
const id = prompt("Digite o código do patrimônio:");
if(id) {
window.location.href = "consulta.html?id=" + id;
}
}

function irEtiqueta() {
const id = prompt("Digite o código para gerar etiqueta:");
if(id) {
window.location.href = "etiqueta.html?id=" + id;
}
}

</script>

</body>
</html>
