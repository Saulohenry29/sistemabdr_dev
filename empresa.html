<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>BDR ERP - Empresas</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b1220;color:white}
header{background:linear-gradient(90deg,#a4161a,#2c3e50);padding:15px 20px;position:sticky;top:0;z-index:1000}
.layout{display:flex}
.sidebar{width:220px;background:#111b2e;min-height:100vh;padding:15px}
.sidebar h3{color:#8ecae6}
.menu-btn{display:block;width:100%;padding:10px;margin:8px 0;border:none;border-radius:6px;cursor:pointer;background:#1c2b3a;color:white;text-align:left}
.menu-btn:hover{background:#2c3e50}
.content{flex:1}
.container{padding:20px}
.card{background:#111b2e;padding:20px;border-radius:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;margin-bottom:5px}
input,textarea{width:100%;padding:10px;border:none;border-radius:6px;box-sizing:border-box}
textarea{height:80px}
.btn{background:#2a9d8f;color:white;border:none;padding:12px;border-radius:8px;cursor:pointer;margin-top:15px}

.lista{
  margin-top:25px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
  gap:22px;
  align-items:stretch;
}

.item{
  background:#fff;
  color:#222;
  border-left:5px solid #a4161a;
  padding:12px; 
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
  font-size:14px;
  line-height:1.6;
  min-height:120px;    
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.item strong{color:#a4161a}

.status{
  display:inline-block;
  width:max-content;
  padding:4px 10px;
  border-radius:20px;
  color:white;
  font-size:12px;
  margin-top:8px;
}

.ATIVA{background:#2a9d8f}
.INATIVA{background:#dc2626}

.btn-card{
  background:#1f2937;
  color:white;
  border:none;
  padding:7px 10px;
  border-radius:7px;
  margin-top:10px;
  margin-right:5px;
  cursor:pointer;
}

.btn-card:hover{background:#a4161a}

@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;min-height:auto}
  .grid{grid-template-columns:1fr}
  .lista{grid-template-columns:1fr}
  .item{min-height:auto}
}
</style>

</head>

<body>

<header>🏢 BDR ERP - Empresas</header>

<div class="layout">

<div class="sidebar">
  <h3>MENU</h3>
  <button class="menu-btn" onclick="ir('dashboard.html')">📊 Dashboard</button>
  <button class="menu-btn" onclick="ir('patrimonio.html')">📦 Patrimônio</button>
  <button class="menu-btn" onclick="ir('empresa.html')">🏢 Empresas</button>
  <button class="menu-btn" onclick="ir('movimentacoes.html')">🔁 Movimentações</button>
  <button class="menu-btn" onclick="ir('relatorios.html')">📄 Relatórios</button>
  <button class="menu-btn">🚜 Veículos e Máquinas</button>
  <button class="menu-btn">👥 Usuários</button>
</div>

<div class="content">
<div class="container">

<div class="card">
<h2>Cadastro de Empresas</h2>

<div class="grid">

  <div>
    <label>Código da Empresa</label>
    <input id="codigo_empresa" placeholder="Ex: 10013">
  </div>
  
  <div>
    <label>Nome da Empresa</label>
    <input id="nome">
  </div>

  <div>
    <label>Setor / Obra</label>
    <input id="setor_obra" placeholder="Ex: Oficina">
  </div>

  <div>
    <label>CNPJ</label>
    <input id="cnpj">
  </div>

  <div>
    <label>Cidade</label>
    <input id="cidade">
  </div>

  <div>
    <label>Estado</label>
    <input id="estado">
  </div>

  <div>
    <label>Endereço</label>
    <input id="endereco">
  </div>

  <div>
    <label>CEP</label>
    <input id="cep">
  </div>

</div>

<br>

<label>Observação</label>
<textarea id="observacao"></textarea>

<button class="btn" onclick="salvarEmpresa()">💾 Salvar Empresa</button>
</div>

<div id="listaEmpresas" class="lista"></div>

</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://ytalegphxrntlomkltbc.supabase.co";
const supabaseKey = "sb_publishable_VXvPi5TQMiPyOxknM5Fw_g_0NHwZYss";

window.client = supabase.createClient(supabaseUrl, supabaseKey);
window.supabaseClient = window.client;
</script>

<script>
function ir(pagina){
  window.location.href = pagina;
}

function db(){
  return window.client || window.supabaseClient;
}

function campo(id){
  return document.getElementById(id).value.trim();
}

async function salvarEmpresa(){

  const empresa = {
    nome: campo("nome"),
    codigo_empresa: campo("codigo_empresa"),
    setor_obra: campo("setor_obra"),
    cnpj: campo("cnpj"),
    cidade: campo("cidade"),
    estado: campo("estado"),
    endereco: campo("endereco"),
    cep: campo("cep"),
    observacao: campo("observacao"),
    ativa: true
  };

  if(!empresa.nome){
    alert("Informe o nome da empresa");
    return;
  }

  if(!empresa.codigo_empresa){
    alert("Informe o código da empresa");
    return;
  }

  if(!empresa.setor_obra){
    alert("Informe o setor / obra");
    return;
  }

  const { data: empresaCriada, error } = await db()
    .from("empresas")
    .insert([empresa])
    .select()
    .single();

  if(error){
    alert(error.message);
    return;
  }

  const obra = {
    empresa_id: empresaCriada.id,
    nome: empresa.setor_obra,
    codigo_obra: empresa.codigo_empresa,
    ativa: true
  };

  const { error: erroObra } = await db()
    .from("obras")
    .insert([obra]);

  if(erroObra){
    alert("Empresa cadastrada, mas erro ao criar obra: " + erroObra.message);
    return;
  }

  alert("Empresa e obra/setor cadastrados com sucesso!");

  limparFormulario();
  carregarEmpresas();
}

async function carregarEmpresas(){

  const { data, error } = await db()
    .from("empresas")
    .select("*")
    .order("nome");

  if(error){
    alert(error.message);
    return;
  }

  const lista = document.getElementById("listaEmpresas");
  lista.innerHTML = "";

  if(!data || data.length === 0){
    lista.innerHTML = "<div class='item'>Nenhuma empresa cadastrada.</div>";
    return;
  }

  data.forEach(e => {

  const statusTexto = e.ativa === false ? "INATIVA" : "ATIVA";

  lista.innerHTML += `
    <div class="item">

      <div>
        <strong>${e.nome || "-"}</strong><br><br>

        <b>Código:</b> ${e.codigo_empresa || "-"}<br>
        <b>Setor/Obra:</b> ${e.setor_obra || "-"}<br>
        <span class="status ${statusTexto}">
          ${statusTexto}
        </span>

        <br><br>

        <button class="btn-card"
          onclick="toggleDetalhes(${e.id})">
          📂 Ver detalhes
        </button>
      </div>

      <div id="detalhes-${e.id}"
           style="display:none;margin-top:15px;">

        <b>Setor/Obra:</b> ${e.setor_obra || "-"}<br>
        <b>CNPJ:</b> ${e.cnpj || "-"}<br>
        <b>Estado:</b> ${e.estado || "-"}<br>
        <b>Endereço:</b> ${e.endereco || "-"}<br>
        <b>CEP:</b> ${e.cep || "-"}<br>
        <b>Observação:</b> ${e.observacao || "-"}<br><br>

        <button class="btn-card"
          onclick="editarEmpresa(${e.id})">
          ✏️ Editar
        </button>

        <button class="btn-card"
          onclick="alterarStatusEmpresa(${e.id}, ${e.ativa === false ? "true" : "false"})">
          ${e.ativa === false ? "✅ Reativar" : "🚫 Inativar"}
        </button>

      </div>

    </div>
  `;
});}

async function alterarStatusEmpresa(id, status){
  const { error } = await db()
    .from("empresas")
    .update({ ativa: status })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  carregarEmpresas();
}

function editarEmpresa(id){
  alert("Próximo passo: vamos criar a edição da empresa ID: " + id);
}

function limparFormulario(){
  document.getElementById("nome").value = "";
  document.getElementById("codigo_empresa").value = "";
  document.getElementById("setor_obra").value = "";
  document.getElementById("cnpj").value = "";
  document.getElementById("cidade").value = "";
  document.getElementById("estado").value = "";
  document.getElementById("endereco").value = "";
  document.getElementById("cep").value = "";
  document.getElementById("observacao").value = "";
}

window.addEventListener("load", carregarEmpresas);
</script>

</body>
</html>
