<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Estoque CD - Sistema BDR</title>
  <link rel="stylesheet" href="./CSS/estilo.css">
</head>
<body>
  <header class="topo">
    <div class="logo"><img src="./imagens/logo.png" alt="Logo BDR"></div>
    <h2 style="margin-left:20px; color:var(--vermelho-bdr);">Sistema BDR</h2>
  </header>

  <nav class="menu-lateral">
    <button onclick="window.location.href='consulta.html'">🔍 Consulta</button>
    <button onclick="window.location.href='entrada.html'">📥 Entrada</button>
    <button onclick="window.location.href='estoque.html'">📦 Estoque</button>
    <button onclick="window.location.href='triagem.html'">📋 Triagem</button>
    <button onclick="window.location.href='reservas.html'">🛒 Reservas</button>
  </nav>

  <div class="container">
    <h1>📦 Estoque CD</h1>
    <div class="card">
      <input type="text" id="busca" placeholder="Buscar produto ou localização..." onkeyup="filtrarTabela()">
      <table id="tabelaEstoque">
        <thead>
          <tr>
            <th>ID</th><th>Produto</th><th>Qtd</th><th>Rua</th><th>Prateleira</th><th>Coluna</th><th>Altura</th><th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ytalegphxrntlomkitlbc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_VXvPi5TQMiPyOxknM5Fw_g_0NHwZYss";

    async function carregarEstoque() {
      const resp = await fetch(`${SUPABASE_URL}/rest/v1/estoque?select=*`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      const dados = await resp.json();
      const tbody = document.querySelector("#tabelaEstoque tbody");
      tbody.innerHTML = "";
      dados.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.id}</td><td>${item.produto}</td><td>${item.qtd}</td>
          <td>${item.rua}</td><td>${item.prateleira}</td><td>${item.coluna}</td><td>${item.altura}</td>
          <td><button class="btn-reserva" onclick="reservarItem(${item.id}, '${item.produto}')">🛒 Reservar</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function reservarItem(idItem, produto) {
      await fetch(`${SUPABASE_URL}/rest/v1/reservas`, {
        method: "POST",
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          id_item: idItem,
          empresa_id: 1, // depois substituímos pelo ID da empresa logada
          usuario: "Usuário Logado",
          qtd: 1,
          data_reserva: new Date().toISOString().split("T")[0],
          status: "Reservado"
        })
      });
      alert(`Produto "${produto}" reservado!`);
    }

    function filtrarTabela() {
      const filtro = document.getElementById("busca").value.toLowerCase();
      document.querySelectorAll("#tabelaEstoque tbody tr").forEach(linha => {
        linha.style.display = linha.innerText.toLowerCase().includes(filtro) ? "" : "none";
      });
    }

    carregarEstoque();
  </script>
</body>
