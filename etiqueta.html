<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta Patrimônio BDR</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  box-sizing:border-box;
}

.card{
  background:#fff;
  width:100%;
  max-width:520px;
  padding:28px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 8px 25px rgba(0,0,0,.35);
}

.logo{
  display:flex;
  justify-content:center;
  margin-bottom:8px;
}

.logo img{
  height:60px;
}

.titulo{
  color:#a4161a;
  font-weight:bold;
  margin:5px 0;
  font-size:28px;
}

.subtitulo{
  font-size:14px;
  margin-bottom:20px;
  color:#555;
}

h1{
  font-size:26px;
  margin:14px 0 22px;
  color:#111;
}

.linha{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:9px 0;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size:15px;
}

.label{
  font-weight:bold;
  color:#333;
  min-width:120px;
}

.valor{
  flex:1;
  text-align:right;
  color:#111;
  word-break:break-word;
}

#status{
  font-weight:bold;
  color:#007bff;
}

#localizacao{
  font-weight:bold;
  color:#2c3e50;
}

@media(max-width:600px){
  .card{
    max-width:100%;
    padding:22px;
  }

  .linha{
    flex-direction:column;
    gap:3px;
  }

  .valor{
    text-align:left;
  }
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="./imagens/logo.png" alt="Logo BDR">
  </div>

  <h2 class="titulo">BDR CONSTRUART</h2>
  <p class="subtitulo">Consulta de Patrimônio</p>

  <h1 id="produto">Carregando...</h1>

  <div class="linha">
    <div class="label">Patrimônio:</div>
    <div class="valor" id="codigo">-</div>
  </div>

  <div class="linha">
    <div class="label">Tipo:</div>
    <div class="valor" id="tipo">-</div>
  </div>

  <div class="linha">
    <div class="label">Marca:</div>
    <div class="valor" id="marca">-</div>
  </div>

  <div class="linha">
    <div class="label">Modelo:</div>
    <div class="valor" id="modelo">-</div>
  </div>

  <div class="linha">
    <div class="label">Série:</div>
    <div class="valor" id="serie">-</div>
  </div>

  <div class="linha">
    <div class="label">Status:</div>
    <div class="valor" id="status">-</div>
  </div>

  <div class="linha">
    <div class="label">Localização:</div>
    <div class="valor" id="localizacao">-</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./JS/supabaseClient.js"></script>

<script>
const params = new URLSearchParams(window.location.search);

const id =
  params.get("id") ||
  params.get("codigo");

async function carregar() {
  if (!id) {
    document.getElementById("produto").innerText = "ID não informado";
    return;
  }

  const { data, error } = await client
    .from("patrimonio")
    .select("*")
    .eq("codigo_qr", id)
    .maybeSingle();

  if (error || !data) {
    console.error(error);
    document.getElementById("produto").innerText = "Item não encontrado";
    document.getElementById("codigo").innerText = id;
    return;
  }

  document.getElementById("produto").innerText = data.nome_bem || "-";
  document.getElementById("codigo").innerText = data.codigo_qr || "-";
  document.getElementById("tipo").innerText = data.tipo_item || "-";
  document.getElementById("marca").innerText = data.marca || "-";
  document.getElementById("modelo").innerText = data.modelo || "-";
  document.getElementById("serie").innerText = data.numero_serie || "-";
  document.getElementById("status").innerText = data.status || "-";
  document.getElementById("localizacao").innerText = data.localizacao || "-";
}

carregar();
</script>

</body>
</html>
