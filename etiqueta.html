<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Etiqueta Patrimônio</title>

<style>
body{
  font-family: Arial;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

/* 🔥 CENTRALIZAÇÃO FORTE */
.wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
}

/* CARD DA ETIQUETA */
.card{
  background:#fff;
  width:380px;
  padding:25px;
  border-radius:10px;
  text-align:center;
}

/* LOGO CENTRALIZADA */
.logo {
  display:flex;
  justify-content:center;
  margin-bottom:5px;
}

.logo img{
  height:45px;
}

/* TÍTULO */
.titulo{
  text-align:center;
  color:#a4161a;
  font-weight:bold;
  margin:5px 0;
}

.subtitulo{
  text-align:center;
  font-size:13px;
  margin-bottom:15px;
}

/* TEXTO */
h1{
  font-size:20px;
  margin:10px 0;
}

p{
  font-size:14px;
  margin:4px 0;
  text-align:left;
}

/* STATUS */
#status{
  font-weight:bold;
  color:#007bff;
}

/* LOCALIZAÇÃO */
#localizacao{
  font-weight:bold;
  color:#2c3e50;
}

/* IMPRESSÃO */
@media print{
  body{
    background:#fff;
  }

  .card{
    box-shadow:none;
    border:none;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="card">

    <div class="logo">
      <img src="./imagens/logo.png">
    </div>

    <h2 class="titulo">BDR CONSTRUART</h2>
    <p class="subtitulo">Controle de Patrimônio</p>

    <h1 id="produto">Carregando...</h1>

    <p><b>ID:</b> <span id="codigo"></span></p>
    <p><b>NFE:</b> <span id="nfe"></span></p>
    <p><b>Marca:</b> <span id="marca"></span></p>
    <p><b>Modelo:</b> <span id="modelo"></span></p>
    <p><b>Série:</b> <span id="serie"></span></p>
    <p><b>Data:</b> <span id="data"></span></p>

    <p><b>Status:</b> <span id="status"></span></p>
    <p><b>Localização:</b> <span id="localizacao"></span></p>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./JS/supabaseClient.js"></script>

<script>
const id = new URLSearchParams(window.location.search).get("id");

async function carregar() {

  if (!id) {
    document.getElementById("produto").innerText = "ID não informado";
    return;
  }

  const { data, error } = await client
    .from("patrimonio")
    .select("*")
    .eq("codigo_qr", id)
    .maybeSingle();

  if (!data || error) {
    document.getElementById("produto").innerText = "Item não encontrado";
    return;
  }

  document.getElementById("produto").innerText = data.nome_bem || "-";
  document.getElementById("codigo").innerText = data.codigo_qr || "-";
  document.getElementById("marca").innerText = data.marca || "-";
  document.getElementById("modelo").innerText = data.modelo || "-";
  document.getElementById("serie").innerText = data.numero_serie || "-";
  document.getElementById("data").innerText = data.data_compra || "-";
  document.getElementById("status").innerText = data.status || "-";
  document.getElementById("nfe").innerText = data.numero_nf || "-";
  document.getElementById("localizacao").innerText = data.localizacao || "-";
}

carregar();
</script>

</body>
</html>
