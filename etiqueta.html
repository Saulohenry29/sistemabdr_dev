<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta Patrimônio BDR</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#111827;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  box-sizing:border-box;
}

/* CARD */
.card{
  width:100%;
  max-width:520px;
  background:#fff;
  border-radius:16px;
  padding:28px;
  box-sizing:border-box;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

/* LOGO */
.logo{
  display:flex;
  justify-content:center;
  margin-bottom:10px;
}

.logo img{
  height:60px;
}

/* TITULO */
.titulo{
  text-align:center;
  color:#a4161a;
  margin:0;
  font-size:28px;
}

.subtitulo{
  text-align:center;
  color:#666;
  margin-top:5px;
  margin-bottom:25px;
}

/* NOME PRODUTO */
#produto{
  text-align:center;
  font-size:28px;
  margin-bottom:25px;
  color:#111827;
}

/* LINHAS */
.linha{
  display:flex;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid #ececec;
}

.label{
  width:130px;
  font-weight:bold;
  color:#374151;
}

.valor{
  flex:1;
  color:#111827;
  word-break:break-word;
}

/* STATUS */
#status{
  font-weight:bold;
  color:#2563eb;
}

/* LOCALIZAÇÃO */
#localizacao{
  font-weight:bold;
  color:#059669;
}

/* RESPONSIVO */
@media(max-width:600px){

  .card{
    padding:18px;
  }

  .linha{
    flex-direction:column;
    gap:4px;
  }

  .label{
    width:100%;
  }

}

</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="./imagens/logo.png" alt="Logo BDR">
  </div>

  <h1 class="titulo">BDR CONSTRUART</h1>

  <p class="subtitulo">
    Consulta de Patrimônio
  </p>

  <h2 id="produto">Carregando...</h2>

  <div class="linha">
    <div class="label">Patrimônio:</div>
    <div class="valor" id="codigo">-</div>
  </div>

  <div class="linha">
    <div class="label">Tipo:</div>
    <div class="valor" id="tipo">-</div>
  </div>

  <div class="linha">
    <div class="label">Marca:</div>
    <div class="valor" id="marca">-</div>
  </div>

  <div class="linha">
    <div class="label">Modelo:</div>
    <div class="valor" id="modelo">-</div>
  </div>

  <div class="linha">
    <div class="label">Série:</div>
    <div class="valor" id="serie">-</div>
  </div>

  <div class="linha">
    <div class="label">Status:</div>
    <div class="valor" id="status">-</div>
  </div>

  <div class="linha">
    <div class="label">Localização:</div>
    <div class="valor" id="localizacao">-</div>
  </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// ======================================
// CONEXÃO SUPABASE
// ======================================

const SUPABASE_URL =
  "https://ytalegphxrntlomkltbc.supabase.co";

const SUPABASE_KEY =
  "sb_publishable_VXvPi5TQMiPyOxknM5Fw_g_0NHwZYss";

const client = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

// ======================================
// PEGAR ID URL
// ======================================

const params = new URLSearchParams(window.location.search);

const id =
  params.get("id") ||
  params.get("codigo");

console.log("ID RECEBIDO:", id);

// ======================================
// CARREGAR DADOS
// ======================================

async function carregar(){

  // SEM ID
  if(!id){

    document.getElementById("produto").innerText =
      "ID não informado";

    return;
  }

  // BUSCAR NO SUPABASE
  const { data, error } = await client
    .from("patrimonio")
    .select("*")
    .eq("codigo_qr", id)
    .maybeSingle();

  console.log("DADOS:", data);
  console.log("ERRO:", error);

  // NÃO ENCONTRADO
  if(error || !data){

    document.getElementById("produto").innerText =
      "Patrimônio não encontrado";

    document.getElementById("codigo").innerText =
      id;

    return;
  }

  // PREENCHER TELA
  document.getElementById("produto").innerText =
    data.nome_bem || "-";

  document.getElementById("codigo").innerText =
    data.codigo_qr || "-";

  document.getElementById("tipo").innerText =
    data.tipo_item || "-";

  document.getElementById("marca").innerText =
    data.marca || "-";

  document.getElementById("modelo").innerText =
    data.modelo || "-";

  document.getElementById("serie").innerText =
    data.numero_serie || "-";

  document.getElementById("status").innerText =
    data.status || "-";

  document.getElementById("localizacao").innerText =
    data.localizacao || "-";
}

// ======================================
// INICIAR
// ======================================

carregar();

</script>

</body>
</html>
