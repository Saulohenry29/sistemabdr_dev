<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BDR ERP - Login</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0b1220,#1f2937);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card-login{
  width:420px;
  background:#fff;
  border-radius:18px;
  padding:35px;
  box-shadow:0 15px 35px rgba(0,0,0,.3);
  border-top:5px solid #a4161a;
}

.logo{
  text-align:center;
  margin-bottom:25px;
}

.logo img{
  width:180px;
}

.logo h1{
  color:#a4161a;
  margin-top:10px;
}

.logo p{
  color:#555;
  margin-top:5px;
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:5px;
  font-weight:bold;
}

input{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:15px;
}

.campo-senha{
  position:relative;
}

.campo-senha input{
  padding-right:80px;
}

.btn-mostrar{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:none;
  color:#a4161a;
  font-weight:bold;
  cursor:pointer;
}

.opcoes{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:12px;
  font-size:13px;
}

.opcoes a{
  color:#a4161a;
  text-decoration:none;
}

.btn-login{
  width:100%;
  margin-top:20px;
  padding:14px;
  background:#a4161a;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.btn-login:hover{
  background:#7d1013;
}

#mensagem{
  text-align:center;
  color:red;
  margin-top:15px;
}

.rodape{
  text-align:center;
  margin-top:20px;
  color:#777;
  font-size:12px;
}

</style>
</head>

<body>

<div class="card-login">

  <div class="logo">
    <img src="imagens/logo.png">
    <h1>BDR ERP</h1>
    <p>Acesso restrito ao sistema</p>
  </div>

  <form id="formLogin">

    <label>Usuário</label>
    <input
      type="text"
      id="usuario"
      placeholder="Digite seu usuário"
      required
    >

    <label>Senha</label>

    <div class="campo-senha">

      <input
        type="password"
        id="senha"
        placeholder="Digite sua senha"
        required
      >

      <button
        type="button"
        class="btn-mostrar"
        onclick="mostrarSenha()">
        Mostrar
      </button>

    </div>

    <div class="opcoes">

      <label>
        <input type="checkbox" id="lembrar" style="width:auto;">
        Lembrar
      </label>

      <a href="#" onclick="alert('Solicite uma nova senha ao administrador MASTER.')">
        Esqueci minha senha
      </a>

    </div>

    <button class="btn-login" type="submit">
      Entrar no Sistema
    </button>

    <div id="mensagem"></div>

  </form>

  <div class="rodape">
    Sistema BDR ERP • v1.0
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="JS/supabaseClient.js"></script>
<script src="JS/auth.js"></script>

<script>

function mostrarSenha(){

  const campo = document.getElementById("senha");

  if(campo.type === "password"){
    campo.type = "text";
  }else{
    campo.type = "password";
  }

}

document
.getElementById("formLogin")
.addEventListener("submit", function(e){

  e.preventDefault();

  fazerLogin();

});

</script>

</body>
</html>
