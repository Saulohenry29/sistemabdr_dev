<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>BDR Patrimônio </title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f9;color:#222}
header{background:#fff;border-bottom:3px solid #a4161a;padding:12px 15px;display:flex;justify-content:space-between;align-items:center}
.layout{display:flex}
.sidebar{width:200px;background:#2c3e50;min-height:100vh;padding:10px}
.menu-btn{width:100%;margin:5px 0;padding:9px;background:#1f2d3a;color:white;border:none;border-radius:5px;cursor:pointer;text-align:left}
.content{flex:1;padding:12px}
.card{background:white;border-radius:8px;padding:12px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.card h3{margin:0 0 8px;color:#a4161a}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px}
input,select,textarea{width:100%;padding:8px;border:1px solid #ccc;border-radius:5px}
button{padding:8px;border:none;border-radius:5px;cursor:pointer;background:#a4161a;color:white}
.btn-ok{background:#2a9d8f}.btn-blue{background:#2563eb}.btn-orange{background:#f97316}.btn-gray{background:#6b7280}.btn-dark{background:#111827}
.item{background:white;border-left:5px solid #a4161a;padding:10px;border-radius:7px;box-shadow:0 2px 5px rgba(0,0,0,.15);font-size:13px;cursor:pointer}
.item:hover{transform:scale(1.01)}
.codigo{font-weight:bold;color:#a4161a;font-size:15px;margin-top:4px}
.status{display:inline-block;margin-top:5px;padding:4px 8px;border-radius:20px;color:white;font-size:12px;background:#6b7280}
.status-ESTOQUE{background:#2a9d8f}.status-EM-USO{background:#2563eb}.status-MANUTENCAO{background:#f97316}.status-BAIXADO{background:#dc2626}
.obra-ativa{font-weight:bold;color:#a4161a}
.check-line{display:flex;align-items:center;gap:6px;font-size:13px}.check-line input{width:auto}
.lock-row{
  display:flex;
  gap:8px;
  align-items:center;
  max-width:650px;
}

.lock-row select{
  flex:1;
}

.lock-btn{
  font-weight:bold;
  min-width:180px;
  white-space:nowrap;
}

.lock-off{
  background:#6b7280;
}

.lock-on{
  background:#2a9d8f;
}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center}
.modal{background:white;width:95%;max-width:680px;border-radius:12px;padding:18px;box-shadow:0 5px 20px rgba(0,0,0,.3)}
.modal h2{margin-top:0;color:#a4161a}
.modal-info{background:#f4f6f9;padding:10px;border-radius:8px;margin-bottom:10px;font-size:14px;line-height:1.6}
.acoes{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:10px}
.fechar{float:right;background:#dc2626}
@media(max-width:768px){.layout{flex-direction:column}.sidebar{width:100%;min-height:auto}}
</style>
</head>

<body>

<header>
  <b>📦 BDR Patrimônio </b>
  <div class="obra-ativa" id="obraAtivaTexto">🔓 Lançamento livre</div>
</header>

<div class="layout">

<div class="sidebar">
  <button class="menu-btn" onclick="ir('dashboard.html')">📊 Dashboard</button>
  <button class="menu-btn" onclick="ir('patrimonio.html')">📦 Patrimônio</button>
  <button class="menu-btn" onclick="ir('empresa.html')">🏢 Empresas</button>
  <button class="menu-btn" onclick="ir('movimentacoes.html')">🔁 Movimentações</button>
  <button class="menu-btn" onclick="ir('relatorios.html')">📄 Relatórios</button>
</div>

<div class="content">

<div class="card">
  <h3>🏗 Obra / Setor de Lançamento</h3>

  <div class="lock-row">
    <select id="obraSelect">
      <option value="">Selecione a obra/setor</option>
    </select>

    <button id="btnTravarObra" class="lock-btn lock-off" onclick="alternarTravaObra()">
      🔓 Livre
    </button>
  </div>
</div>

<div class="card">
  <h3>📥 Entrada de Patrimônio</h3>

  <div class="grid">
    <input id="nome_bem" placeholder="Nome do item Ex: TV Samsung">

    <select id="tipo_item" onchange="mostrarCampos()">
      <option value="">Tipo de ativo</option>
      <option value="ELETRONICO">Eletrônico</option>
      <option value="ELETRODOMESTICO">Eletrodoméstico</option>
      <option value="VEICULO">Veículo</option>
      <option value="FERRAMENTA">Ferramenta</option>
      <option value="MAQUINA">Máquina agrícola</option>
      <option value="MOBILIARIO">Mobiliário</option>
      <option value="INFORMATICA">Informática</option>
      <option value="EQUIPAMENTO">Equipamento</option>
      <option value="MATERIAL_APOIO">Material de apoio</option>
      <option value="OUTRO">Outro</option>
    </select>

    <select id="status_inicial">
      <option value="ESTOQUE">Status inicial: Estoque</option>
      <option value="EM_USO">Status inicial: Em uso</option>
      <option value="MANUTENCAO">Status inicial: Manutenção</option>
      <option value="BAIXADO">Status inicial: Baixado</option>
    </select>

    <input id="valor_bem" type="text" placeholder="Valor do bem Ex: 1.350,00" oninput="mascaraMoeda(this)">
  </div>

  <div id="campoOutroTipo" class="grid" style="display:none;margin-top:8px;">
    <input id="tipo_outro" placeholder="Descreva o tipo do ativo">
  </div>

  <br>

  <label class="check-line">
    <input type="checkbox" id="checkLegado" onchange="mostrarCamposLegado()">
    Patrimônio já existente / legado
  </label>

  <div id="camposLegado" class="grid" style="display:none;margin-top:10px;">
    <input id="codigo_antigo" placeholder="Código antigo patrimônio">

    <select id="estado_conservacao">
      <option value="">Estado conservação</option>
      <option value="NOVO">Novo</option>
      <option value="BOM">Bom</option>
      <option value="REGULAR">Regular</option>
      <option value="RUIM">Ruim</option>
    </select>
  </div>

  <br>

  <textarea id="observacao" placeholder="Observações do patrimônio..."></textarea>

  <div id="camposExtras" class="grid" style="margin-top:8px;"></div>

  <br>

  <button class="btn-ok" onclick="gerarPatrimonio()">Gerar Patrimônio</button>
</div>

<div class="card">
  <h3>🔎 Buscar / Filtrar Patrimônios</h3>

  <div class="grid">
    <input id="busca" placeholder="Buscar por nome, código, obra, marca..." oninput="renderizarPatrimonios()">

    <select id="filtroStatus" onchange="renderizarPatrimonios()">
      <option value="">Todos os status</option>
      <option value="ESTOQUE">Estoque</option>
      <option value="EM_USO">Em uso</option>
      <option value="MANUTENCAO">Manutenção</option>
      <option value="BAIXADO">Baixado</option>
    </select>

    <select id="filtroTipo" onchange="renderizarPatrimonios()">
      <option value="">Todos os tipos</option>
      <option value="ELETRONICO">Eletrônico</option>
      <option value="ELETRODOMESTICO">Eletrodoméstico</option>
      <option value="VEICULO">Veículo</option>
      <option value="FERRAMENTA">Ferramenta</option>
      <option value="MAQUINA">Máquina agrícola</option>
      <option value="MOBILIARIO">Mobiliário</option>
      <option value="INFORMATICA">Informática</option>
      <option value="EQUIPAMENTO">Equipamento</option>
      <option value="MATERIAL_APOIO">Material de apoio</option>
      <option value="OUTRO">Outro</option>
    </select>
  </div>
</div>

<div class="card">
  <h3>🏷 Patrimônios cadastrados</h3>
  <div id="lista" class="grid"></div>
</div>

</div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="fechar" onclick="fecharModal()">X</button>

    <h2 id="modalTitulo">Patrimônio</h2>
    <div class="modal-info" id="modalInfo"></div>

    <label><strong>Justificativa obrigatória da movimentação</strong></label>
    <textarea id="observacaoMov" placeholder="Ex: item enviado para manutenção, troca de setor, baixa por defeito..."></textarea>

    <br><br>

    <label>Trocar para outra obra/setor</label>
    <select id="novaObraSelect">
      <option value="">Selecione nova obra/setor</option>
    </select>

    <div class="acoes">
      <button class="btn-ok" onclick="alterarStatus('ESTOQUE')">📦 Voltar Estoque</button>
      <button class="btn-blue" onclick="alterarStatus('EM_USO')">✅ Colocar Em Uso</button>
      <button class="btn-orange" onclick="alterarStatus('MANUTENCAO')">🛠 Manutenção</button>
      <button onclick="trocarObra()">🔁 Trocar Setor</button>
      <button class="btn-gray" onclick="alterarStatus('BAIXADO')">⬇️ Baixar</button>
      <button class="btn-dark" onclick="imprimirEtiqueta()">🖨 Etiqueta</button>
      <button onclick="abrirEdicao()">✏️ Editar Dados</button>
    </div>
  </div>
</div>
<div class="modal-bg" id="modalEdicaoBg">
  <div class="modal">
    <button class="fechar" onclick="fecharEdicao()">X</button>

    <h2>✏️ Correção Cadastral</h2>

    <div class="grid">
      <input id="edit_nome_bem" placeholder="Nome do patrimônio">
      <input id="edit_valor_bem" placeholder="Valor do bem Ex: 1.350,00" oninput="mascaraMoeda(this)">
      <input id="edit_marca" placeholder="Marca">
      <input id="edit_modelo" placeholder="Modelo">
      <input id="edit_codigo_antigo" placeholder="Código antigo">
    </div>

    <br>

    <textarea id="edit_observacao" placeholder="Observação do patrimônio"></textarea>

    <br><br>

    <textarea id="motivo_correcao" placeholder="Motivo obrigatório da correção cadastral"></textarea>

    <br><br>

    <button class="btn-ok" onclick="salvarEdicaoPatrimonio()">
      💾 Salvar Correção
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./JS/supabaseClient.js"></script>
<script src="./JS/bdrCore.js"></script>
<script>
let obras = [];
let patrimonios = [];
let patrimonioSelecionado = null;
window.obraAtiva = null;
window.obraTravada = false;

function ir(pagina){
  window.location.href = pagina;
}

function db(){
  return window.client || window.supabaseClient;
}

function valor(id){
  const el = document.getElementById(id);
  if(!el) return "";
  return String(el.value || "").trim();
}

function moedaParaNumero(valorTexto){
  if(!valorTexto) return null;

  return Number(
    valorTexto
      .replace(/\./g, "")
      .replace(",", ".")
      .replace(/[^\d.]/g, "")
  ) || null;
}

function formatarMoeda(valor){
  if(valor === null || valor === undefined || valor === ""){
    return "R$ 0,00";
  }

  return Number(valor).toLocaleString("pt-BR", {
    style:"currency",
    currency:"BRL"
  });
}

function mascaraMoeda(input){
  let valor = input.value.replace(/\D/g, "");

  if(!valor){
    input.value = "";
    return;
  }

  valor = (Number(valor) / 100).toFixed(2);

  input.value = Number(valor).toLocaleString("pt-BR", {
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

async function carregarObras(){

  const { data, error } = await db()
    .from("obras")
    .select("*")
    .eq("ativa", true)
    .order("nome");

  if(error){
    console.error(error);
    alert(error.message);
    return;
  }

  obras = data || [];

  const select = document.getElementById("obraSelect");
  const novaSelect = document.getElementById("novaObraSelect");

  select.innerHTML = `<option value="">Selecione a obra/setor</option>`;
  novaSelect.innerHTML = `<option value="">Selecione nova obra/setor</option>`;

  obras.forEach(o => {
    const texto = `${o.codigo_obra || "-"} - ${o.nome || "-"}`;

    select.innerHTML += `<option value="${o.id}">${texto}</option>`;
    novaSelect.innerHTML += `<option value="${o.id}">${texto}</option>`;
  });
}

function alternarTravaObra(){

  if(window.obraTravada){
    destravarObra();
    return;
  }

  const obra_id = document.getElementById("obraSelect").value;

  if(!obra_id){
    alert("Selecione uma obra/setor para travar.");
    return;
  }

  const obraSelecionada = obras.find(
    o => String(o.id) === String(obra_id)
  );

  if(!obraSelecionada){
    alert("Obra não encontrada.");
    return;
  }

  window.obraAtiva = obraSelecionada;
  window.obraTravada = true;

  localStorage.setItem("obraAtivaId", obraSelecionada.id);
  localStorage.setItem("obraTravada", "SIM");

  atualizarVisualTrava();
}

function destravarObra(){
  window.obraTravada = false;
  window.obraAtiva = null;

  localStorage.removeItem("obraAtivaId");
  localStorage.removeItem("obraTravada");

  atualizarVisualTrava();
}

function atualizarVisualTrava(){

  const btn = document.getElementById("btnTravarObra");
  const textoTopo = document.getElementById("obraAtivaTexto");

  if(window.obraTravada && window.obraAtiva){

    btn.className = "lock-btn lock-on";

    btn.innerText =
      "🔒 " +
      (window.obraAtiva.codigo_obra || "-") +
      " - " +
      (window.obraAtiva.nome || "-");

    textoTopo.innerText =
      "🔒 TRAVADO: " +
      (window.obraAtiva.codigo_obra || "-") +
      " - " +
      (window.obraAtiva.nome || "-");

  }else{

    btn.className = "lock-btn lock-off";
    btn.innerText = "🔓 Livre";

    textoTopo.innerText = "🔓 Lançamento livre";
  }
}

function obterObraParaLancamento(){

  if(window.obraTravada && window.obraAtiva){
    return window.obraAtiva;
  }

  const obra_id = document.getElementById("obraSelect").value;

  if(!obra_id){
    return null;
  }

  const obraSelecionada = obras.find(
    o => String(o.id) === String(obra_id)
  );

  return obraSelecionada || null;
}

function mostrarCamposLegado(){

  const check = document.getElementById("checkLegado");
  const campos = document.getElementById("camposLegado");

  if(!check || !campos) return;

  campos.style.display = check.checked ? "grid" : "none";
}

function mostrarCampos(){

  const tipo = valor("tipo_item");
  const div = document.getElementById("camposExtras");
  const campoOutro = document.getElementById("campoOutroTipo");

  div.innerHTML = "";

  campoOutro.style.display =
    tipo === "OUTRO" ? "grid" : "none";

  if(
    tipo === "ELETRONICO" ||
    tipo === "FERRAMENTA" ||
    tipo === "ELETRODOMESTICO" ||
    tipo === "INFORMATICA" ||
    tipo === "EQUIPAMENTO"
  ){
    div.innerHTML = `
      <input id="marca" placeholder="Marca">
      <input id="modelo" placeholder="Modelo">
      <input id="numero_serie" placeholder="Número de série">
    `;
  }

  if(tipo === "VEICULO"){
    div.innerHTML = `
      <input id="placa" placeholder="Placa">
      <input id="marca" placeholder="Marca">
      <input id="modelo" placeholder="Modelo">
      <input id="cor" placeholder="Cor">
      <input id="ano" placeholder="Ano">
      <input id="combustivel" placeholder="Combustível">
    `;
  }

  if(tipo === "MAQUINA"){
    div.innerHTML = `
      <input id="marca" placeholder="Marca">
      <input id="modelo" placeholder="Modelo">
      <input id="potencia" placeholder="Potência">
      <input id="horimetro" placeholder="Horímetro">
      <input id="combustivel" placeholder="Combustível">
      <input id="ano_fabricacao" placeholder="Ano fabricação">
    `;
  }

  if(tipo === "MOBILIARIO" || tipo === "MATERIAL_APOIO"){
    div.innerHTML = `
      <input id="marca" placeholder="Marca/Fabricante">
      <input id="modelo" placeholder="Modelo/Descrição">
    `;
  }
}

async function gerarPatrimonio(){

  const obra = obterObraParaLancamento();

  if(!obra){
    alert("Selecione uma obra/setor para lançamento.");
    return;
  }

  const nome_bem = valor("nome_bem");
  const tipo_item = valor("tipo_item");
  const status_inicial = valor("status_inicial") || "ESTOQUE";

  if(!nome_bem || !tipo_item){
    alert("Preencha nome do bem e tipo.");
    return;
  }

  if(tipo_item === "OUTRO" && !valor("tipo_outro")){
    alert("Descreva o tipo do ativo.");
    return;
  }

const prefixoCodigo = "PAT-" + (obra.codigo_obra || "");

const { data: ultimo, error: erroUltimo } = await db()
  .from("patrimonio")
  .select("codigo_qr")
  .like("codigo_qr", prefixoCodigo + "%")
  .order("codigo_qr", { ascending:false })
  .limit(1);

if(erroUltimo){
  alert("Erro ao buscar último código.");
  return;
}

let sequencial = 1;

if(ultimo && ultimo.length > 0 && ultimo[0].codigo_qr){
  const ultimoCodigo = ultimo[0].codigo_qr;
  const numeroFinal = ultimoCodigo.replace(prefixoCodigo, "");
  sequencial = Number(numeroFinal) + 1;
}

const codigo_qr =
  prefixoCodigo +
  String(sequencial).padStart(4, "0");
  const patrimonio = {
    nome_bem,
    tipo_item,
    tipo_outro: valor("tipo_outro") || null,

    empresa_id: obra.empresa_id ? Number(obra.empresa_id) : null,
    obra_id: obra.id ? Number(obra.id) : null,
    localizacao: obra.nome || null,

    sequencial: Number(sequencial),
    codigo_qr,
    status: status_inicial,

    marca: valor("marca") || null,
    modelo: valor("modelo") || null,
    numero_serie: valor("numero_serie") || null,

    placa: valor("placa") || null,
    cor: valor("cor") || null,
    ano: valor("ano") ? parseInt(valor("ano")) : null,

    combustivel: valor("combustivel") || null,
    potencia: valor("potencia") || null,
    horimetro: moedaParaNumero(valor("horimetro")),
    ano_fabricacao: valor("ano_fabricacao") ? parseInt(valor("ano_fabricacao")) : null,

    valor_bem: moedaParaNumero(valor("valor_bem")),
    codigo_antigo: valor("codigo_antigo") || null,
    estado_conservacao: valor("estado_conservacao") || null,
    observacao: valor("observacao") || null,

    origem_cadastro:
      document.getElementById("checkLegado").checked
        ? "LEGADO"
        : "NOVO"
  };

  const { error } = await db()
    .from("patrimonio")
    .insert([patrimonio]);

  if(error){
    console.error(error);
    alert(error.message);
    return;
  }

  alert("Patrimônio criado: " + codigo_qr);

  limparFormularioCadastro();
  carregarPatrimonios();
}function limparFormularioCadastro(){
  document.getElementById("nome_bem").value = "";
  document.getElementById("tipo_item").value = "";
  document.getElementById("status_inicial").value = "ESTOQUE";
  document.getElementById("valor_bem").value = "";
  document.getElementById("tipo_outro").value = "";
  document.getElementById("campoOutroTipo").style.display = "none";
  document.getElementById("observacao").value = "";
  document.getElementById("codigo_antigo").value = "";
  document.getElementById("estado_conservacao").value = "";
  document.getElementById("checkLegado").checked = false;
  document.getElementById("camposLegado").style.display = "none";
  document.getElementById("camposExtras").innerHTML = "";
}

async function carregarPatrimonios(){

  const { data, error } = await db()
    .from("patrimonio")
    .select("*")
    .order("id", { ascending:false });

  if(error){
    console.error(error);
    alert(error.message);
    return;
  }

  patrimonios = data || [];
  renderizarPatrimonios();
}

function renderizarPatrimonios(){

  const busca = valor("busca").toLowerCase();
  const filtroStatus = valor("filtroStatus");
  const filtroTipo = valor("filtroTipo");

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const filtrados = patrimonios.filter(p => {

    const texto = `
      ${p.nome_bem || ""}
      ${p.codigo_qr || ""}
      ${p.codigo_antigo || ""}
      ${p.localizacao || ""}
      ${p.marca || ""}
      ${p.modelo || ""}
      ${p.tipo_item || ""}
      ${p.tipo_outro || ""}
      ${p.status || ""}
    `.toLowerCase();

    return texto.includes(busca) &&
      (!filtroStatus || p.status === filtroStatus) &&
      (!filtroTipo || p.tipo_item === filtroTipo);
  });

  if(filtrados.length === 0){
    lista.innerHTML = "<p>Nenhum patrimônio encontrado.</p>";
    return;
  }

  filtrados.forEach(p => {

    const statusClasse = String(p.status || "")
      .replace(" ", "-")
      .replace("Ç", "C")
      .replace("Ã", "A");

    lista.innerHTML += `
      <div class="item" onclick="abrirModal(${p.id})">
        <b>${p.nome_bem || "-"}</b><br>
        <span>${p.localizacao || "SEM OBRA"}</span><br>
        <span>${p.tipo_item || "-"} ${p.tipo_outro ? "- " + p.tipo_outro : ""}</span><br>
        <div class="codigo">${p.codigo_qr || "-"}</div>
        <small>Antigo: ${p.codigo_antigo || "-"}</small><br>
        <small>Valor: ${formatarMoeda(p.valor_bem)}</small><br>
        <span class="status status-${statusClasse}">${p.status || "SEM STATUS"}</span>
      </div>
    `;
  });
}

function abrirModal(id){

  const p = patrimonios.find(
    x => Number(x.id) === Number(id)
  );

  if(!p){
    alert("Patrimônio não encontrado.");
    return;
  }

  patrimonioSelecionado = p;

  document.getElementById("modalTitulo").innerText =
    p.nome_bem || "Patrimônio";

  document.getElementById("modalInfo").innerHTML = `
    <strong>Código:</strong> ${p.codigo_qr || "-"}<br>
    <strong>Código Antigo:</strong> ${p.codigo_antigo || "-"}<br>
    <strong>Origem:</strong> ${p.origem_cadastro || "-"}<br>
    <strong>Status:</strong> ${p.status || "-"}<br>
    <strong>Obra:</strong> ${p.localizacao || "-"}<br>
    <strong>Tipo:</strong> ${p.tipo_item || "-"} ${p.tipo_outro ? "- " + p.tipo_outro : ""}<br>
    <strong>Marca:</strong> ${p.marca || "-"}<br>
    <strong>Modelo:</strong> ${p.modelo || "-"}<br>
    <strong>Nº Série:</strong> ${p.numero_serie || "-"}<br>
    <strong>Placa:</strong> ${p.placa || "-"}<br>
    <strong>Valor:</strong> ${formatarMoeda(p.valor_bem)}<br>
    <strong>Estado:</strong> ${p.estado_conservacao || "-"}<br>
    <strong>Observação:</strong> ${p.observacao || "-"}
  `;

  document.getElementById("observacaoMov").value = "";
  document.getElementById("novaObraSelect").value = "";
  document.getElementById("modalBg").style.display = "flex";
}

function fecharModal(){
  document.getElementById("modalBg").style.display = "none";
  patrimonioSelecionado = null;
}

async function gravarMovimentacao(dados){

  const { error } = await db()
    .from("movimentacoes")
    .insert([{
      patrimonio_id: dados.patrimonio_id,
      empresa_id: dados.empresa_id,
      obra_origem_id: dados.obra_origem_id,
      obra_destino_id: dados.obra_destino_id,
      tipo: dados.tipo,
      status_anterior: dados.status_anterior,
      status_novo: dados.status_novo,
      observacao: dados.observacao
    }]);

  if(error){
    console.error(error);
    alert("Erro ao gravar movimentação: " + error.message);
    return false;
  }

  return true;
}

async function alterarStatus(novoStatus){

  if(!patrimonioSelecionado){
    alert("Selecione um patrimônio.");
    return;
  }

  const obs = valor("observacaoMov");

  if(!obs || obs.length < 5){
    alert("Informe uma justificativa da movimentação.");
    return;
  }

  const statusAnterior = patrimonioSelecionado.status || null;

  const { error } = await db()
    .from("patrimonio")
    .update({ status: novoStatus })
    .eq("id", patrimonioSelecionado.id);

  if(error){
    console.error(error);
    alert(error.message);
    return;
  }

  await gravarMovimentacao({
    patrimonio_id: patrimonioSelecionado.id,
    empresa_id: patrimonioSelecionado.empresa_id,
    obra_origem_id: patrimonioSelecionado.obra_id,
    obra_destino_id: patrimonioSelecionado.obra_id,
    tipo: "ALTERACAO_STATUS",
    status_anterior: statusAnterior,
    status_novo: novoStatus,
    observacao: obs
  });

  alert("Status alterado com sucesso.");

  fecharModal();
  carregarPatrimonios();
}

async function trocarObra(){

  if(!patrimonioSelecionado){
    alert("Selecione um patrimônio.");
    return;
  }

  const obs = valor("observacaoMov");

  if(!obs || obs.length < 5){
    alert("Informe uma justificativa da troca de setor/obra.");
    return;
  }

  const novaObraId = document.getElementById("novaObraSelect").value;

  if(!novaObraId){
    alert("Selecione a nova obra/setor.");
    return;
  }

  const novaObra = obras.find(
    o => String(o.id) === String(novaObraId)
  );

  if(!novaObra){
    alert("Obra não encontrada.");
    return;
  }

  const statusAnterior = patrimonioSelecionado.status || null;
  const obraOrigemId = patrimonioSelecionado.obra_id || null;

  const { error } = await db()
    .from("patrimonio")
    .update({
      obra_id: novaObra.id,
      empresa_id: novaObra.empresa_id,
      localizacao: novaObra.nome,
      status: "EM_USO"
    })
    .eq("id", patrimonioSelecionado.id);

  if(error){
    console.error(error);
    alert(error.message);
    return;
  }

  await gravarMovimentacao({
    patrimonio_id: patrimonioSelecionado.id,
    empresa_id: novaObra.empresa_id,
    obra_origem_id: obraOrigemId,
    obra_destino_id: novaObra.id,
    tipo: "TROCA_SETOR",
    status_anterior: statusAnterior,
    status_novo: "EM_USO",
    observacao: obs
  });

  alert("Patrimônio transferido com sucesso.");

  fecharModal();
  carregarPatrimonios();
}

function imprimirEtiqueta(){

  if(!patrimonioSelecionado){
    alert("Selecione um patrimônio.");
    return;
  }

  const codigoSeguro = encodeURIComponent(
    patrimonioSelecionado.codigo_qr || ""
  );

  window.open(
    "./etiqueta-impressao.html?id=" + codigoSeguro,
    "_blank"
  );
}
function abrirEdicao(){

  if(!patrimonioSelecionado){
    alert("Selecione um patrimônio.");
    return;
  }

  document.getElementById("edit_nome_bem").value =
    patrimonioSelecionado.nome_bem || "";

  document.getElementById("edit_valor_bem").value =
    patrimonioSelecionado.valor_bem
      ? Number(patrimonioSelecionado.valor_bem).toLocaleString("pt-BR", {
          minimumFractionDigits:2,
          maximumFractionDigits:2
        })
      : "";

  document.getElementById("edit_marca").value =
    patrimonioSelecionado.marca || "";

  document.getElementById("edit_modelo").value =
    patrimonioSelecionado.modelo || "";

  document.getElementById("edit_codigo_antigo").value =
    patrimonioSelecionado.codigo_antigo || "";

  document.getElementById("edit_observacao").value =
    patrimonioSelecionado.observacao || "";

  document.getElementById("motivo_correcao").value = "";

  document.getElementById("modalEdicaoBg").style.display = "flex";
}

function fecharEdicao(){
  document.getElementById("modalEdicaoBg").style.display = "none";
}

async function salvarEdicaoPatrimonio(){

  if(!patrimonioSelecionado){
    alert("Selecione um patrimônio.");
    return;
  }

  const motivo = valor("motivo_correcao");

  if(!motivo || motivo.length < 5){
    alert("Informe o motivo da correção cadastral.");
    return;
  }

  const dadosAtualizados = {
    nome_bem: valor("edit_nome_bem"),
    valor_bem: moedaParaNumero(valor("edit_valor_bem")),
    marca: valor("edit_marca"),
    modelo: valor("edit_modelo"),
    codigo_antigo: valor("edit_codigo_antigo"),
    observacao: valor("edit_observacao")
  };

  const { error } = await db()
    .from("patrimonio")
    .update(dadosAtualizados)
    .eq("id", patrimonioSelecionado.id);

  if(error){
    console.error(error);
    alert(error.message);
    return;
  }

  await gravarMovimentacao({
    patrimonio_id: patrimonioSelecionado.id,
    empresa_id: patrimonioSelecionado.empresa_id,
    obra_origem_id: patrimonioSelecionado.obra_id,
    obra_destino_id: patrimonioSelecionado.obra_id,
    tipo: "CORRECAO_CADASTRAL",
    status_anterior: patrimonioSelecionado.status,
    status_novo: patrimonioSelecionado.status,
    observacao: motivo
  });

  alert("Correção cadastral salva com sucesso!");

  fecharEdicao();
  fecharModal();
  carregarPatrimonios();
}
async function iniciar(){

  if(!db()){
    alert("Supabase não carregado.");
    return;
  }

  await carregarObras();

  const obraSalva = localStorage.getItem("obraAtivaId");
  const travada = localStorage.getItem("obraTravada");

  if(obraSalva && travada === "SIM"){
    const existe = obras.find(
      o => String(o.id) === String(obraSalva)
    );

    if(existe){
      window.obraAtiva = existe;
      window.obraTravada = true;
      document.getElementById("obraSelect").value = obraSalva;
    }
  }

  atualizarVisualTrava();

  await carregarPatrimonios();
}

iniciar();
</script>
