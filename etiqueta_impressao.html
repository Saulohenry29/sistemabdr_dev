<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta Impressão - Sistema BDR</title>

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #fff;
    }

    .etiqueta {
      width: 5.5cm;
      height: 3.5cm;
      border: 1px solid #000;
      border-radius: 6px;
      padding: 5px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .linha-topo {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .logo img {
      height: 1.2cm;
    }

    .qr img {
      height: 1.2cm;
      width: 1.2cm;
      margin-top: 2mm;
    }

    .conteudo {
      display: flex;
      justify-content: space-between;
      margin-top: -10px;
    }

    .info-esquerda {
      font-size: 9px;
      text-align: left;
      line-height: 1.2;
    }

    .info-direita {
      font-size: 9px;
      font-weight: bold;
      text-align: right;
      align-self: flex-end;
    }

    @media print {
      body {
        margin: 0;
        background: #fff;
      }
    }
  </style>
</head>

<body>

  <div class="etiqueta">
    <div class="linha-topo">
      <div class="logo">
        <img src="./imagens/logo.png" alt="Logo BDR">
      </div>

      <div class="qr">
        <img id="qr" src="" alt="QR Code">
      </div>
    </div>

    
      <div class="info-direita" id="idProduto">
        Patrimônio: ...
      </div>
    </div>
  </div>

  <!-- IMPORTA O JS EXTERNO -->
  <script src="etiqueta_impressao.js"></script>

</body>
</html>
