<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Sistema BDR</title>
  <link rel="stylesheet" href="./CSS/estilo.css">
</head>
<body>

  <!-- Cabeçalho -->
  <header class="topo">
    <div class="logo">
      <img src="./imagens/logo.png" alt="Logo BDR">
    </div>
    <h2 style="margin-left:20px; color:var(--vermelho-bdr);">Sistema BDR</h2>
  </header>

  <!-- Menu lateral -->
  <nav class="menu-lateral">
  <button onclick="window.location.href='consulta.html'">🔍 Consulta</button>
  <button onclick="window.location.href='estoque.html'">📦 Estoque</button>
  <button onclick="window.location.href='triagem.html'">📋 Triagem</button>
  <button onclick="window.location.href='dashboard.html'">📊 Dashboard</button>
     </nav>

  <!-- Conteúdo principal -->
  <div class="container">
    <h1>Dashboard</h1>

    <div class="dashboard">
      <!-- Card Patrimônio -->
      <div class="card">
        <h2>Patrimônio</h2>
        <p>Total: <span id="totalPatrimonio">0</span></p>
      </div>

      <!-- Card Estoque -->
      <div class="card">
        <h2>Estoque</h2>
        <p>Total: <span id="totalEstoque">0</span></p>
      </div>

      <!-- Card Últimos Cadastros -->
      <div class="card">
        <h2>Últimos Cadastros</h2>
        <ul id="ultimosCadastros" style="list-style:none; padding:0; margin:0;">
          <li>Carregando...</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    // Exemplo de integração com backend
    async function carregarDashboard() {
      try {
        const token = localStorage.getItem("token");

        // Patrimônio
        const respPatrimonio = await fetch("http://localhost:3000/patrimonio", {
          headers: { "Authorization": "Bearer " + token }
        });
        const patrimonio = await respPatrimonio.json();
        document.getElementById("totalPatrimonio").innerText = patrimonio.length;

        // Estoque
        const respEstoque = await fetch("http://localhost:3000/estoque", {
          headers: { "Authorization": "Bearer " + token }
        });
        const estoque = await respEstoque.json();
        document.getElementById("totalEstoque").innerText = estoque.length;

        // Últimos cadastros (pegando os 5 últimos do estoque)
        const lista = document.getElementById("ultimosCadastros");
        lista.innerHTML = "";
        estoque.slice(-5).forEach(item => {
          const li = document.createElement("li");
          li.textContent = item.nome || "Item sem nome";
          lista.appendChild(li);
        });

      } catch (err) {
        console.error(err);
      }
    }

    carregarDashboard();
  </script>
</body>
</html>
