<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Etiqueta Patrimônio BDR</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  background:#fff;
  font-family:Arial,sans-serif;
}

.etiqueta{
  width:5.5cm;
  height:3.5cm;
  border:2px solid #000;
  border-radius:6px;
  padding:5px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:#fff;
}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.logo-texto{
  line-height:1;
}

.logo-principal{
  font-size:45px;
  font-weight:999;
  color:#e30613;
  letter-spacing:-4px;
}

.engrenagem-img{
  height:32px;
  margin-right:-10px;
}

.bdr-texto{
  color:#e30613;
  font-size:47px;
  font-weight:900;
  letter-spacing:-2px;
}

.logo-sub{
  font-size:10px;
  font-style:italic;
  font-weight:600;
  color:#555;
  text-align:right;
  margin-top:-5px;
  font-family:cursive;
}

.qr img{
  width:1.2cm;
  height:1.2cm;
}

.meio{
  font-size:9px;
  font-weight:bold;
  line-height:1.25;
}

.obra{
  max-width:3.6cm;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.item{
  max-width:4cm;
  margin-top:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.codigo{
  font-size:11px;
  font-weight:bold;
  text-align:right;
}

@media print{
  body{
    margin:0;
    background:#fff;
  }

  .etiqueta{
    border:2px solid #000 !important;
  }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">

    <div class="logo-texto">
      <div class="logo-principal">

  <img
    src="./imagens/engrenagem.png"
    class="engrenagem-img"
  >

  <span class="bdr-texto">BDR</span>

</div>
      <div class="logo-sub">Construart</div>
    </div>

    <div class="qr">
      <img id="qr" src="">
    </div>

  </div>

  <div class="meio">

  <div>
    <span class="label">Local:</span>
    <span class="obra" id="obra">
      OBRA / SETOR
    </span>
  </div>

  <div>
    <span class="label">Item:</span>
    <span class="item" id="item">
      ITEM PATRIMÔNIO
    </span>
  </div>

</div>

  <div class="codigo" id="codigo">
    PAT-000000000
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./JS/supabaseClient.js"></script>

<script>
const params = new URLSearchParams(window.location.search);

const codigo =
  params.get("codigo") ||
  params.get("id") ||
  "PAT-000000000";

function db(){
  return window.client || window.supabaseClient;
}

function cortarTexto(texto, limite){
  if(!texto) return "-";
  return texto.length > limite
    ? texto.substring(0, limite) + "..."
    : texto;
}

document.getElementById("codigo").innerText = codigo;

const linkQr =
  "https://saulohenry29.github.io/sistemaBDR/etiqueta.html?id=" +
  encodeURIComponent(codigo);

document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" +
  encodeURIComponent(linkQr);

async function carregarDados(){

  if(!db()){
    document.getElementById("obra").innerText = "SEM OBRA";
    document.getElementById("item").innerText = "ITEM";
    return;
  }

  const { data, error } = await db()
    .from("patrimonio")
    .select("*")
    .eq("codigo_qr", codigo)
    .single();

  if(error || !data){
    console.error(error);
    document.getElementById("obra").innerText = "SEM OBRA";
    document.getElementById("item").innerText = "ITEM";
    return;
  }

  document.getElementById("obra").innerText =
    cortarTexto(data.localizacao || "SEM OBRA", 24);

  document.getElementById("item").innerText =
    cortarTexto(data.nome_bem || "ITEM", 26);
}

carregarDados();
</script>

</body>
</html>
