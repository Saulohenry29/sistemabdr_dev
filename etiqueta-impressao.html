<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Etiqueta Patrimônio BDR</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  background:#fff;
  font-family:Arial,sans-serif;
}

.etiqueta{
  width:5.5cm;
  height:3.5cm;
  border:2px solid #000;
  border-radius:6px;
  padding:5px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:#fff;
}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.logo img{
  height:1.2cm;
}

.qr img{
  width:1.2cm;
  height:1.2cm;
}

.baixo{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
}

.setor{
  font-size:9px;
  font-weight:bold;
  width:60%;
  line-height:1.2;
}

.codigo{
  font-size:10px;
  font-weight:bold;
  text-align:right;
}

@media print{
  body{
    margin:0;
    background:#fff;
  }

  .etiqueta{
    border:2px solid #000 !important;
  }
}
</style>
</head>

<body>

<div class="etiqueta">

  <div class="topo">

    <div class="logo">
      <img src="./imagens/logo.png" alt="Logo BDR">
    </div>

    <div class="qr">
      <img id="qr" src="">
    </div>

  </div>

<div class="baixo">

  <div></div>

  <div class="codigo" id="codigo">
    PAT-000000000
  </div>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const codigo =
  params.get("codigo") ||
  params.get("id") ||
  "PAT-000000000";

const setor =
  decodeURIComponent(
    params.get("setor") || "SEM SETOR"
  );


document.getElementById("codigo").innerText =
  codigo;

const linkQr =
  "https://saulohenry29.github.io/sistemaBDR/etiqueta.html?id=" +
  encodeURIComponent(codigo);

document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" +
  encodeURIComponent(linkQr);
</script>

</body>
</html>
