<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta Impressão - Sistema BDR</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #fff;
    }

    .etiqueta {
      width: 5.5cm;
      height: 3.5cm;
      border: 1px solid #000;
      border-radius: 6px;
      padding: 5px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Linha superior: logo à esquerda, QR à direita */
    .linha-topo {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .logo img {
      height: 1.2cm;
    }

    .qr img {
      height: 1.2cm;
      width: 1.2cm;
      margin-top: 2mm;
    }

    /* Área de informações */
    .conteudo {
      display: flex;
      justify-content: space-between;
      margin-top: -10px;
    }

    .info-esquerda {
      font-size: 9px;
      text-align: left;
      line-height: 1.2;
    }

    .info-direita {
      font-size: 9px;
      font-weight: bold;
      text-align: right;
      align-self: flex-end;
    }

    @media print {
      body {
        margin: 0;
        background: #fff;
      }
    }
  </style>
</head>
<body>
  <div class="etiqueta">
    <div class="linha-topo">
      <div class="logo">
        <img src="./imagens/logo.png" alt="Logo BDR">
      </div>
      <div class="qr">
        <img id="qr" src="" alt="QR Code">
      </div>
    </div>

    <div class="conteudo">
      <div class="info-esquerda">
        <div id="produto">Produto: ...</div>
        <div id="codigo">Código: ...</div>
        <div id="marca">Marca: ...</div>
        <div id="modelo">Modelo: ...</div>
        <div id="serie">Nº Série: ...</div>
      </div>
      <div class="info-direita" id="idProduto">Patrimônio: ...</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const url = "https://docs.google.com/spreadsheets/d/1r1K8A6RwkGXBrHWLKc3otE5G3SWHBmFSXCWfNLDs7rQ/gviz/tq?tqx=out:json";

    fetch(url)
      .then(res => res.text())
      .then(data => {
        const json = JSON.parse(data.substring(47).slice(0, -2));
        const rows = json.table.rows;

        rows.forEach(r => {
          if (r.c[0] && r.c[0].v == id) {
            document.getElementById("idProduto").innerText = "Patrimônio: " + (r.c[0]?.v || "");
            document.getElementById("produto").innerText = "Produto: " + (r.c[3]?.v || "");
            document.getElementById("codigo").innerText = "Código: " + (r.c[2]?.v || "");
            document.getElementById("marca").innerText = "Marca: " + (r.c[4]?.v || "");
            document.getElementById("modelo").innerText = "Modelo: " + (r.c[5]?.v || "");
            document.getElementById("serie").innerText = "Nº Série: " + (r.c[6]?.v || "");

            // ✅ QR Code vinculado ao sistema
            document.getElementById("qr").src = 
              `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://saulohenry29.github.io/sistema_web_BDR/etiqueta.html?id=${id}`;
          }
        });
      })
      .catch(err => console.error("Erro ao carregar dados:", err));
  </script>
</body>
</html>
