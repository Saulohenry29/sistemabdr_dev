<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>BDR BI 7.1 - Sistema Empresarial</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =====================
   BASE
===================== */
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: #fff;
}

/* =====================
   LAYOUT PRINCIPAL
===================== */
.layout {
  display: flex;
  height: 100vh;
}

/* =====================
   MENU LATERAL
===================== */
.sidebar {
  width: 220px;
  background: #111b2e;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sidebar h2 {
  color: #ffd166;
  font-size: 16px;
  margin-bottom: 10px;
}

.sidebar a {
  color: white;
  text-decoration: none;
  padding: 10px;
  border-radius: 8px;
  background: #1e2a44;
  transition: 0.2s;
}

.sidebar a:hover {
  background: #a4161a;
}

/* =====================
   CONTEÚDO
===================== */
.content {
  flex: 1;
  padding: 20px;
}

/* =====================
   HEADER
===================== */
header {
  background: linear-gradient(90deg, #a4161a, #2c3e50);
  padding: 15px;
  font-weight: bold;
  border-radius: 10px;
  margin-bottom: 15px;
}

/* =====================
   KPIs
===================== */
.kpis {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 15px;
}

.kpi {
  background: #111b2e;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.kpi strong {
  font-size: 22px;
  color: #ffd166;
}

/* =====================
   GRID
===================== */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

/* CARD */
.card {
  background: #111b2e;
  padding: 15px;
  border-radius: 12px;
  min-height: 220px;
}

/* ALERTA */
.alerta {
  background: #2a1b1b;
  border-left: 5px solid red;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 6px;
}

/* RESPONSIVO */
@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; flex-direction: row; overflow-x: auto; }
  .grid { grid-template-columns: 1fr; }
}

</style>

</head>

<body>

<div class="layout">

  <!-- =====================
       MENU
  ===================== -->
  <div class="sidebar">
    <h2>📦 BDR ERP</h2>

    <a href="dashboard.html">📊 Dashboard</a>
    <a href="patrimonio.html">📦 Patrimônio</a>
    <a href="triagem.html">📥 Triagem</a>
    <a href="bi.html">🧠 BI IA</a>
  </div>

  <!-- =====================
       CONTEÚDO
  ===================== -->
  <div class="content">

    <header>
      📊 DASHBOARD BDR BI EMPRESARIAL 7.1
    </header>

    <!-- KPIs -->
    <div class="kpis">
      <div class="kpi">Total <br><strong id="total">0</strong></div>
      <div class="kpi">Críticos <br><strong id="criticos">0</strong></div>
      <div class="kpi">Manutenção <br><strong id="manutencao">0</strong></div>
    </div>

    <!-- GRID -->
    <div class="grid">

      <div class="card">
        <h3>🚨 Alertas</h3>
        <div id="alertas"></div>
      </div>

      <div class="card">
        <h3>📊 Status Geral</h3>
        <canvas id="graf1"></canvas>
      </div>

    </div>

  </div>
</div>

<script src="./JS/supabaseClient.js"></script>

<script>

let dados = [];

async function carregar() {

  const { data } = await client.from("patrimonio").select("*");
  dados = data || [];

  montar();
}

function montar() {

  document.getElementById("total").innerText = dados.length;

  let crit = dados.filter(d => d.status === "MANUTENCAO").length;
  document.getElementById("criticos").innerText = crit;

  let est = dados.filter(d => d.status === "ESTOQUE").length;
  let man = crit;

  document.getElementById("manutencao").innerText = man;

  montarAlertas();
  montarGrafico(est, man);
}

/* ALERTAS */
function montarAlertas() {

  const div = document.getElementById("alertas");
  div.innerHTML = "";

  dados.filter(d => d.status === "MANUTENCAO")
    .slice(0,5)
    .forEach(d => {
      div.innerHTML += `<div class="alerta">🔴 ${d.nome_bem}</div>`;
    });
}

/* GRAFICO */
function montarGrafico(est, man) {

  new Chart(document.getElementById("graf1"), {
    type: "pie",
    data: {
      labels: ["Estoque","Manutenção"],
      datasets: [{
        data: [est, man]
      }]
    }
  });

}

carregar();

</script>

</body>
</html>
